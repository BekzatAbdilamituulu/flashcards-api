services:
  - type: web
    name: deeplex-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: ./entrypoint.sh
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: RUN_MIGRATIONS_ON_START
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: deeplex-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: REFRESH_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: MYMEMORY_DE_EMAIL
        sync: false

  - type: web
    name: deeplex-web
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: deeplex-api
          property: url
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false

databases:
  - name: deeplex-db
    databaseName: deeplex
    user: deeplex
